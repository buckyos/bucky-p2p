schema_version: 1
version: v0.1
module: p2p-frame
defaults:
  workdir: .
  timeout_sec: 1800
  env: {}
levels:
  unit:
    mode: enabled
    summary: 面向 transport、tunnel、protocol 和 identity 子模块的 crate 本地验证，包含 `TunnelManager` 的统一 publish 生命周期断言、`pn_server` 的 source/target 双边统计与 source 单边限速桥接断言、proxy stream 的 TLS-over-proxy 断言，以及 `PnTunnel` idle close 状态机断言
    test_targets:
      - p2p-frame/src/networks/**
      - p2p-frame/src/tunnel/**
      - p2p-frame/src/ttp/**
      - p2p-frame/src/sn/**
      - p2p-frame/src/pn/**
      - p2p-frame/src/x509.rs
      - p2p-frame/src/tls/**
    preconditions:
      tools: ["cargo"]
      env: []
      services: []
      notes:
        - 源码内的异步和同步测试是主要的 unit 验证面。
        - `tunnel/tunnel_manager.rs` 的 unit 测试必须覆盖 direct/proxy/普通 incoming 的 register 后立即 publish、reverse waiter 命中时的延后 publish、waiter 完成后的统一 publish 路径，以及 waiter 清理后的 later-arriving reverse 不再隐藏。
        - `tunnel/tunnel_manager.rs` 的 unit 测试还必须覆盖统一 publish 入口的幂等性，以及 published candidate 相对 hidden reverse candidate 的选择优先级。
        - `pn/service/pn_server.rs` 的 unit 测试必须覆盖 source/target 双边成功转发字节统计、仅 source 侧生效的用户级限速，以及 `sfo-io` 集成失败路径。
        - 当前 `pn/client/pn_tunnel.rs` 的 unit 测试已直接覆盖 passive 明文兼容、`TlsRequired` 成功、TLS 身份校验失败、`datagram` 忽略 `stream` 模式，以及 `create_tunnel_with_options(...)` / client 级模式配置下 datagram 不被本地拒绝。
        - active `PnTunnel::open_stream()` 的默认明文兼容、双端模式错配和真实 TLS client 握手失败路径仍应继续补足 direct unit 证据。
        - `pn/client/pn_tunnel.rs` 的 unit 测试必须覆盖 idle timeout 关闭、active/pending/queued channel 阻止 idle close、accept 等待者被唤醒、后续 open 立即失败、stream/datagram/TLS wrapper lease drop 归还计数，以及关闭后同一 `(remote_id, tunnel_id)` 的后续 inbound open 重新创建 tunnel。
    steps:
      - id: p2p-frame-unit
        name: 运行 p2p-frame unit 测试集
        run: ["cargo", "test", "-p", "p2p-frame"]

  dv:
    mode: enabled
    summary: 使用现有 all-in-one 场景驱动器执行本地运行时验证，并确认默认 `PnServer::new(...)` 路径在接入 source/target 双边统计与 source 单边限速后仍可启动，当前显式启用的 proxy stream TLS-over-proxy 配置不破坏场景运行，且默认 30 分钟 `PnTunnel` idle timeout 不影响短时场景
    test_targets:
      - cyfs-p2p-test/src/main.rs
      - devices/
      - logs/
    preconditions:
      tools: ["cargo"]
      env: []
      services: []
      notes:
        - 因为 `p2p-frame` 没有独立二进制入口，所以 DV 使用现有本地 all-in-one 场景。
        - DV 关注 `cyfs-p2p-test` 现有 `PnServer::new(...)` 调用点是否保持兼容。
        - 当前 DV 场景已显式启用 `set_proxy_stream_encrypted(true)`；它验证的是 stack 默认 proxy client 的 client 级 TLS 模式配置路径。
        - relay 只能桥接 TLS 握手字节和密文，不能成为 TLS 终止点，也不需要理解 TLS 模式字段。
        - idle close 的精确时间和竞态验证由 unit 承担；DV 只验证默认 idle 配置不会破坏正常短时 proxy 场景。
    steps:
      - id: p2p-frame-dv
        name: 运行本地 all-in-one 场景
        run: ["cargo", "run", "-p", "cyfs-p2p-test", "--", "all-in-one"]

  integration:
    mode: enabled
    summary: 工作区级兼容性与下游使用方验证，确认 `pn_server` 新增 source/target 双边统计、source 单边限速、proxy stream TLS-over-proxy 能力和 `PnTunnel` idle close 内部状态不会破坏现有调用方
    test_targets:
      - cyfs-p2p
      - cyfs-p2p-test
      - sn-miner-rust
    preconditions:
      tools: ["cargo"]
      env: []
      services: []
      notes:
        - Integration 聚焦于核心 crate 的下游兼容性。
        - 特别关注 `cyfs-p2p-test` 与 `sn-miner-rust` 的 `PnServer::new(...)` 调用点兼容性。
        - 现有未显式启用 TLS-over-proxy 的调用方必须保持明文兼容，不得因新增 PN 专有 API 扩展而回归。
        - `PnTunnel` idle close 的新配置和 wrapper 类型不得要求下游修改通用 `Tunnel` / `TunnelNetwork` 调用签名。
    steps:
      - id: p2p-frame-integration
        name: 运行工作区测试套件
        run: ["cargo", "test", "--workspace"]
