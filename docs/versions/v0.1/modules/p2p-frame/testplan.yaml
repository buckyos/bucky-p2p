schema_version: 1
version: v0.1
module: p2p-frame
defaults:
  workdir: .
  timeout_sec: 1800
  env: {}
levels:
  unit:
    mode: enabled
    summary: 面向 transport、tunnel、protocol 和 identity 子模块的 crate 本地验证，包含 endpoint area `ServerReflexive` 编解码和 SN 观察地址分类断言、SN control stream 信令断言、SN server 连接验证器默认 allow-all 与自定义 reject 断言、SN service contract/receipt 生产路径清理断言、`TunnelManager` 的统一 publish 生命周期断言、incoming reverse 无 waiter close 断言、单 SN NAT 打洞调度、SN 存在时仅对 `ServerReflexive` QUIC candidate 开启的同源 UDP punch 断言、QUIC heartbeat timeout 断言、基于 `sfo-reuseport` 的 TCP/QUIC listener runtime 注入和 socket 适配编译边界、`TunnelNetwork::listen(...)` 回调化、`Tunnel::listen_stream(...)` / `listen_datagram(...)` 入站 channel 回调化、`Tunnel::open_control_stream(...)` / `listen_control_stream(...)` control stream API、bounded channel 顶层分位置容量默认值/单项覆盖、后续 stack 容量配置 API 删除和源码 unbounded mpsc 清理、`pn_server` 的 source/target 双边统计与 source 单边限速桥接断言、proxy stream 的 TLS-over-proxy 断言，以及 `PnTunnel` idle close 与 control channel 状态机断言
    test_targets:
      - p2p-frame/src/networks/**
      - p2p-frame/src/tunnel/**
      - p2p-frame/src/ttp/**
      - p2p-frame/src/sn/**
      - p2p-frame/src/pn/**
      - p2p-frame/src/x509.rs
      - p2p-frame/src/tls/**
    preconditions:
      tools: ["cargo"]
      env: []
      services: []
      notes:
        - 源码内的异步和同步测试是主要的 unit 验证面。
        - `tunnel/tunnel_manager.rs` 的 unit 测试必须覆盖 direct/proxy/普通 incoming 的 register 后立即 publish、reverse waiter 命中时 incoming 分支只交付不 register/publish、waiter 接收方完成 register/publish，以及 incoming reverse 无同 `(remote_id, tunnel_id)` waiter 时被关闭且不 register/publish。
        - `tunnel/tunnel_manager.rs` 的 unit 测试还必须覆盖统一 publish 入口的幂等性、published candidate 相对 hidden reverse candidate 的选择优先级，以及同一远端多个 published candidate 中非 proxy 优先于更新时间更晚的 proxy。
        - `tunnel/tunnel_manager.rs` 的 unit 测试必须覆盖 reverse 统一 300ms 延迟、direct/reverse 共享同一 logical tunnel、proxy 新建后进入 15s/30s/60s/120s 短窗口脱代理、短窗口后回到 2 小时封顶退避，以及 endpoint 评分按协议隔离失败。
        - `TunnelConnectIntent`、`networks/quic/listener.rs` 与 `networks/quic/network.rs` 的 unit 测试必须覆盖 UDP punch 默认关闭、`TunnelManager` 只在 SN service 存在且候选是 `ServerReflexive` QUIC endpoint 时为单次 candidate intent 开启，且开启后同源 UDP punch 只从 QUIC listener 同一本地端口发送、`Lan`、`Wan`、`Mapped`、TCP、IPv6、0 端口和无 SN service 反例不启用、reverse 在 `0ms` 起发、active 在 `250ms` 起发，随后都以固定 `50ms` cadence 发送并在默认 `1s` 截止或更短 hedged window 结束时停止、payload 可为每包 `5..=30` 字节随机短载荷且不要求 magic/version 或 tunnel/candidate 关联信息、发送失败不改变 QUIC 建链结果，且不新增 raw UDP 接收解析或业务载荷路径。
        - `networks/quic/tunnel.rs` 的 unit 测试必须覆盖 QUIC heartbeat interval 保持 5 秒且 heartbeat timeout 为 30 秒，timeout 后仍走既有 close/error 路径。
        - `networks/tcp/listener.rs`、`networks/quic/listener.rs`、`networks/tcp/network.rs`、`networks/quic/network.rs` 与 `stack.rs` 必须通过 unit 编译覆盖 `sfo_reuseport::TcpServer` / `QuicServer::serve_socket(...)` listener 接入、外部 `ServerRuntime` 注入、默认 runtime 创建、per-worker Quinn endpoint、worker CID generator 和 QUIC `AsyncUdpSocket` 适配边界。
        - `networks/network.rs`、`networks/net_manager.rs`、`networks/tcp/network.rs`、`networks/quic/network.rs`、`pn/client/pn_client.rs` 与 `stack.rs` 必须通过 unit 编译或行为测试覆盖 `TunnelNetwork::listen(...)` 接收入站 tunnel 回调、返回 `P2pResult<()>`、公共 trait 移除 `listeners()`、`NetManager` 通过回调执行 validator/发布/reject close，以及 PN proxy listener 幂等 listen 不依赖 listener 对象查询。
        - `networks/tunnel.rs`、`networks/tcp/tunnel.rs`、`networks/quic/tunnel.rs`、`pn/client/pn_tunnel.rs`、`stream/stream_manager.rs`、`datagram/datagram_manager.rs` 和 `ttp/runtime.rs` 必须通过 unit 编译或行为测试覆盖公共 `Tunnel` trait 移除 `accept_stream()` / `accept_datagram()`，`listen_stream(...)` / `listen_datagram(...)` 注册回调后由 tunnel 内部 dispatch loop 交付入口 stream/datagram，关闭后不继续交付成功 channel，且 PN `PortNotListen` 错误可通过 callback 返回并继续监听。
        - `networks/tunnel.rs`、`networks/control_stream.rs`、`networks/tcp/tunnel.rs`、`networks/quic/tunnel.rs` 和 `pn/client/pn_tunnel.rs` 必须通过 unit 编译或行为测试覆盖 `Tunnel::open_control_stream(...)` / `listen_control_stream(...)`，确认内部 runtime/frame 类型未公开导出，TCP/QUIC/PN 只通过单一 `Data` 控制命令承载内部 frame，覆盖 purpose 过滤、重复 listen 替换、64KiB 发送切分、接收超限拒绝，底层控制通道断开后所有派生 stream、pending open 和 pending write 失败，以及 TCP/QUIC/PN tunnel 建立后的 control stream 双向收发。
        - `sn/client/sn_service.rs` 与 `sn/service/service.rs` 必须通过 unit 编译或行为测试覆盖 SN command service 为 SN purpose 注册 control stream listener，control stream 入站可包装为 cmd tunnel；代码审查必须确认 SN client 默认只调用 `open_control_stream(...)`，在控制通道不可用、远端未监听或旧版本不支持时失败且不 fallback 到普通 `open_stream(...)`，SN service 不注册普通 `listen_stream(...)` 作为 SN 命令入口。
        - `sn/service/service.rs` 必须通过 unit 行为测试覆盖默认 `allow_all_sn_connection_validator()` 不拒绝带客户端证书的 report；自定义 validator reject 时 `handle_report_sn(...)` 返回 `PermissionDenied`，validator 上下文只能包含来自 cmd tunnel `peer_id` 的 `client_id` 和匹配该 id 的 `client_cert`，reject 后不得更新 peer manager 或继续处理该 report；证书解析 id 与 `client_id` 不一致时不得调用 validator，也不得更新 peer manager。
        - `sn/service/service.rs`、`sn/service/mod.rs` 和 `sn/client/mod.rs` 必须通过编译和源码搜索确认不再构造、导出或依赖 `SnServiceContractServer`、service receipt 模块或 client contract helper；`sn/protocol` 中既有 receipt wire 兼容结构、`contract_id` 和 `receipt` 字段可保留，不作为清理失败。
        - `stack.rs` 的 unit 测试必须覆盖 `P2pConfig` 默认用户不设置时仍存在的各队列位置 channel 容量均为 `1024`、单项容量可显式覆盖且不影响其他位置，覆盖 `P2pStackConfig` 从 `P2pEnv` 继承分位置容量且可显式覆盖；源码搜索必须确认 `p2p-frame/src` 内不再存在 `unbounded_channel`、`UnboundedSender` 或 `UnboundedReceiver`，并确认 TCP/QUIC tunnel 不再保留旧 accept queue 容量参数。
        - 后续 `stack_channel_capacity_config_removal` 清理必须覆盖 `stack.rs` 不再导出 `ChannelCapacityConfig`，`P2pConfig` / `P2pStackConfig` / `P2pEnv` 不再提供 stack 层容量 getter/setter 或容量快照继承，`NetManager` 不再保存或暴露 channel capacity，`QuicTunnelNetwork::new(...)` 和 `TtpRuntime::new()` 不再接收容量参数，`TtpClient` / `TtpServer` 不再为了创建 TTP runtime 读取 `NetManager` 容量，`PnClient` 不再提供显式 channel capacity 构造入口。
        - `sn/client/sn_service.rs` 与 `sn/service/service.rs` 的 unit 测试必须覆盖 `SnCall` 携带本次建链的 `reverse_endpoint_array`，SN called 保留调用方候选并扩展单 SN 观察候选，且不引入多 SN fanout。
        - `endpoint.rs` 的 unit 测试必须覆盖 `EndpointArea::ServerReflexive` 使用 `S` 文本标记、raw codec 往返保持 area、`D` 不再作为新语义输入、`is_static_wan()` 不包含 `ServerReflexive`，并通过编译期覆盖确认 `is_sys_default()` 已移除。
        - `sn/service/service.rs` 的 unit 测试必须覆盖 SN 观察 socket address 与节点自上报 endpoint 完全一致时标记 `Wan`，不一致时标记 `ServerReflexive`。
        - `pn/service/pn_server.rs` 的 unit 测试必须覆盖 source/target 双边成功转发字节统计、仅 source 侧生效的用户级限速，以及 `sfo-io` 集成失败路径。
        - 当前 `pn/client/pn_tunnel.rs` 的 unit 测试已直接覆盖 passive 明文兼容、`TlsRequired` 成功、TLS 身份校验失败、`datagram` 忽略 `stream` 模式，以及 `create_tunnel_with_options(...)` / client 级模式配置下 datagram 不被本地拒绝。
        - active `PnTunnel::open_stream()` 的默认明文兼容、双端模式错配和真实 TLS client 握手失败路径仍应继续补足 direct unit 证据。
        - `pn/client/pn_tunnel.rs` 的 unit 测试必须覆盖 idle timeout 关闭、active/pending/queued channel 阻止 idle close、accept 等待者被唤醒、后续 open 立即失败、stream/datagram/TLS wrapper lease drop 归还计数，以及关闭后同一 `(remote_id, tunnel_id)` 的后续 inbound open 重新创建 tunnel。
        - `pn/protocol.rs`、`pn/client/pn_client.rs`、`pn/client/pn_listener.rs`、`pn/client/pn_tunnel.rs` 与必要 `pn/service/pn_server.rs` 的 unit 测试必须覆盖 control open/ready 与业务 `ProxyOpenReq` 分离、active create 等待 control ready、ready 失败不保留半开 tunnel、passive control open 创建 tunnel、remote close、control EOF、decode/write 失败、heartbeat timeout、manual close 通知对端、以及 control close/manual close/idle close 共享幂等 close path。
    steps:
      - id: p2p-frame-unit
        name: 运行 p2p-frame unit 测试集
        change_ids: ["endpoint_area_server_reflexive", "server_reflexive_quic_nat_keepalive", "reverse_timeout_close_late_tunnel", "networks_sfo_reuseport_tcp_listener", "networks_sfo_reuseport_quic_listener_socket", "tunnel_network_listen_callback", "bounded_channel_capacity_config", "stack_channel_capacity_config_removal", "tunnel_stream_datagram_listen_callback", "tunnel_control_stream_api", "sn_control_stream_signaling", "sn_server_connection_validator", "remove_sn_service_contract_server"]
        run: ["cargo", "test", "-p", "p2p-frame"]

  dv:
    mode: disabled
    summary: p2p-frame 当前不定义自动 DV 入口；`cyfs-p2p-test all-in-one` 不得作为本模块或其他模块的 DV 证据。
    change_ids: ["endpoint_area_server_reflexive", "server_reflexive_quic_nat_keepalive", "reverse_timeout_close_late_tunnel", "networks_sfo_reuseport_tcp_listener", "networks_sfo_reuseport_quic_listener_socket", "tunnel_network_listen_callback", "bounded_channel_capacity_config", "stack_channel_capacity_config_removal", "tunnel_stream_datagram_listen_callback", "tunnel_control_stream_api", "sn_control_stream_signaling", "sn_server_connection_validator", "remove_sn_service_contract_server"]
    reason: 当前没有满足 harness 自动完成语义的 p2p-frame DV 入口；运行时兼容性由 unit 和 integration 承担，新增 DV 必须另行 proposal/design/testing。

  integration:
    mode: enabled
    summary: 工作区级兼容性与下游使用方验证，确认 `ServerReflexive` endpoint area 语义、SN control stream 信令、SN server 连接验证器默认 allow-all 构造路径、SN service contract/receipt 生产路径清理、单 SN NAT 打洞优化和默认关闭、仅 SN 存在时对 `ServerReflexive` QUIC candidate 开启的同源 UDP punch、QUIC heartbeat timeout 调整、基于 `sfo-reuseport` 的 TCP listener 与 QUIC per-worker endpoint runtime 注入和 socket 适配、`TunnelNetwork::listen(...)` 回调化、`Tunnel::listen_stream(...)` / `listen_datagram(...)` 入站 channel 回调化、`Tunnel::open_control_stream(...)` / `listen_control_stream(...)` control stream API、bounded channel 顶层分位置容量配置及后续 stack 容量配置 API 删除、incoming reverse 无 waiter close、`pn_server` 新增 source/target 双边统计、source 单边限速、proxy stream TLS-over-proxy 能力、`PnTunnel` idle close 内部状态和 `PnTunnel` control channel ready gate 不会破坏现有调用方
    test_targets:
      - cyfs-p2p
      - cyfs-p2p-test
      - sn-miner-rust
    preconditions:
      tools: ["cargo"]
      env: []
      services: []
      notes:
        - Integration 聚焦于核心 crate 的下游兼容性。
        - 特别关注 `cyfs-p2p-test` 与 `sn-miner-rust` 的 `PnServer::new(...)` 调用点兼容性。
        - 现有未显式启用 TLS-over-proxy 的调用方必须保持明文兼容，不得因新增 PN 专有 API 扩展而回归。
        - `PnTunnel` idle close 的新配置和 wrapper 类型不得要求下游修改通用 `Tunnel` / `TunnelNetwork` 调用签名。
        - `PnTunnel` control channel 不得要求下游修改通用 `Tunnel` / `TunnelNetwork` 调用签名；`create_tunnel*` 可以更严格地等待 control ready 后返回可用 tunnel。
        - NAT 打洞优化不得要求下游实现多 SN、STUN/TURN 或新的 `TunnelNetwork` trait 参数。
        - incoming reverse 无 waiter close 只影响本地未等待的 reverse incoming，不得改变公开 trait、SN 协议、普通 incoming 或命中 waiter 的 reverse open。
        - 同源 UDP punch 不得要求下游处理 raw UDP payload、暴露新业务接口或修改 `TunnelNetwork` trait 参数；默认关闭，只有 `TunnelManager` 在 SN service 存在且候选是 `ServerReflexive` QUIC endpoint 时才为本次 `TunnelConnectIntent` 开启。
        - QUIC heartbeat timeout 调整不得要求下游修改通用 `Tunnel` / `TunnelNetwork` 调用签名。
        - `sfo-reuseport` listener 重构只允许本轮批准的 `TunnelNetwork::listen(...)` 回调化、返回 `P2pResult<()>` 和移除 `listeners()`；外部 runtime 注入只通过 `P2pConfig` 和 network 构造函数扩展；QUIC worker endpoint 和 CID shard 路由必须保持在 `networks/quic` 内部。
        - `ServerReflexive` 公开 enum 和 `is_sys_default()` 删除不得留下未迁移的 workspace 调用点；下游若需要文本 endpoint，应使用 `S` 标记。
        - bounded channel 容量配置不得要求下游直接构造底层 network/tunnel 队列默认值；默认用户无需设置容量，下游可继续通过 `P2pConfig` / `P2pStackConfig` 或显式构造参数传递仍存在队列的对应位置容量；TCP/QUIC tunnel 不再暴露旧 accept queue 容量参数。
        - `stack_channel_capacity_config_removal` 清理后，下游不得继续依赖 `ChannelCapacityConfig` 或 stack 层容量 getter/setter；默认构造路径必须继续可用。
        - `Tunnel` 入站 stream/datagram 回调化不得改变 TCP/QUIC/PN 线协议、TLS 身份校验、PN proxy channel 协议、业务 payload 格式、vport/purpose 编解码或 tunnel publish 规则；下游不得继续依赖公共 `accept_stream()` / `accept_datagram()` trait 方法。
        - `Tunnel` control stream API 不得要求下游依赖内部 `control_stream` runtime/frame；下游只能通过 `open_control_stream(...)` / `listen_control_stream(...)` 使用该能力，现有 stream/datagram、TLS 身份校验、PN proxy 业务 channel 和 tunnel publish 行为不得回归。
        - SN control stream 信令不得要求下游依赖内部 `control_stream` runtime/frame，不得改变 SN 单 SN 边界、endpoint 分类或 `SnCallResp` 受理语义；远端未监听 control purpose、控制通道不可用或旧版本不支持时必须失败且不得 fallback 到普通 stream。
        - SN server 连接验证器默认使用 allow-all，`sn-miner-rust`、`cyfs-p2p-test` 和其他默认构造调用方不得因为新增 validator 而必须显式传入配置。
        - SN service contract/receipt 生产路径清理后，`sn-miner-rust`、`cyfs-p2p-test` 和其他默认 SN service 调用方不得需要重建 `SnServiceContractServer` 或 service receipt 兼容旁路。
    steps:
      - id: p2p-frame-integration
        name: 运行工作区测试套件
        change_ids: ["endpoint_area_server_reflexive", "server_reflexive_quic_nat_keepalive", "reverse_timeout_close_late_tunnel", "networks_sfo_reuseport_tcp_listener", "networks_sfo_reuseport_quic_listener_socket", "tunnel_network_listen_callback", "bounded_channel_capacity_config", "stack_channel_capacity_config_removal", "tunnel_stream_datagram_listen_callback", "tunnel_control_stream_api", "sn_control_stream_signaling", "sn_server_connection_validator", "remove_sn_service_contract_server"]
        run: ["cargo", "test", "--workspace"]
