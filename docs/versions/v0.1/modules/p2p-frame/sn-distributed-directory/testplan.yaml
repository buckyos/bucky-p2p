schema_version: 1
version: v0.1
module: p2p-frame
submodule: sn-distributed-directory
defaults:
  workdir: .
  timeout_sec: 1800
  env: {}
levels:
  unit:
    mode: enabled
    summary: Targeted SN distributed directory unit coverage for serving lease compatibility, owner control plane sessions, partitioned peer route, directory client/server boundary, OwnerMember heartbeat validity, HRW owner resolution, inter-SN validator side effects, no-registry fallback behavior, owner peer command dispatch, owner serving listener command dispatch, and the real-client 5x5 SN command matrix.
    steps:
      - id: sn-distributed-directory-unit
        name: Run SN distributed directory targeted unit tests
        change_ids: ["sn_distributed_directory", "sn_distributed_query_merge", "sn_distributed_relay_call", "sn_inter_service_validation", "sn_owner_directory_peer_transport"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_distributed_directory", "--", "--nocapture"]
      - id: sn-directory-client-server-boundary-unit
        name: Run SN directory client/server boundary targeted unit tests
        change_ids: ["sn_owner_serving_role_boundary", "sn_directory_client_server_boundary"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_directory_client_server_boundary", "--", "--nocapture"]
      - id: sn-owner-member-heartbeat-validity-unit
        name: Run SN OwnerMember heartbeat validity targeted unit tests
        change_ids: ["sn_owner_member_heartbeat_validity"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_member_heartbeat_validity", "--", "--nocapture"]
      - id: sn-owner-control-plane-unit
        name: Run SN owner control plane targeted unit tests
        change_ids: ["sn_owner_control_plane_online_state"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_control_plane_online_state_require_leader_and_quorum", "--", "--nocapture"]
      - id: sn-owner-network-election-unit
        name: Run SN owner network election targeted unit tests
        change_ids: ["sn_owner_network_leader_election"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_network", "--", "--nocapture"]
      - id: sn-owner-leader-online-replication-unit
        name: Run SN owner leader online-state replication targeted unit tests
        change_ids: ["sn_owner_leader_online_replication"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_leader_online_replication", "--", "--nocapture"]
      - id: sn-report-route-decoupling-unit
        name: Run SN ReportSn route publish decoupling targeted unit test
        change_ids: ["sn_partitioned_peer_route", "sn_serving_online_route_independent_loops"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_report_updates_local_detail_without_publishing_route", "--", "--nocapture"]
      - id: sn-partitioned-peer-route-unit
        name: Run SN partitioned peer route targeted unit tests
        change_ids: ["sn_partitioned_peer_route"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_partitioned_peer_route_filters_revoked_serving_session", "--", "--nocapture"]
      - id: sn-owner-serving-listener-unit
        name: Run SN OwnerDirectoryServer serving-facing listener targeted unit tests
        change_ids: ["sn_owner_serving_listener_transport", "sn_directory_no_registry_fallback"]
        run: ["cargo", "test", "-p", "p2p-frame", "owner_serving_listener", "--", "--nocapture"]
      - id: sn-5x5-command-matrix-x509-warmup-unit
        name: Run SN x509 single serving/client online warmup test
        change_ids: ["sn_five_by_five_command_matrix"]
        run: ["cargo", "test", "-p", "p2p-frame", "--features", "x509", "sn_single_serving_with_owner_client_client_online", "--", "--nocapture"]
      - id: sn-5x5-command-matrix-unit
        name: Run SN 5 owner / 5 serving / 5 user real-client command matrix targeted unit test
        change_ids: ["sn_five_by_five_command_matrix"]
        run: ["cargo", "test", "-p", "p2p-frame", "--features", "x509", "sn_five_by_five_command_matrix", "--", "--nocapture"]
  dv:
    mode: enabled
    summary: Real process sn-miner owner/serving role startup evidence plus targeted p2p SN unit coverage.
    steps:
      - id: sn-real-process-owner-serving-dv
        name: Run sn-miner real process owner/serving DV
        change_ids: ["sn_real_process_owner_serving_dv"]
        run: ["cargo", "test", "-p", "sn-miner", "--test", "real_process", "--", "--test-threads=1"]
  integration:
    mode: enabled
    summary: Real process sn-miner owner/serving role startup evidence.
    steps:
      - id: sn-real-process-owner-serving-integration
        name: Run sn-miner real process owner/serving integration
        change_ids: ["sn_real_process_owner_serving_dv"]
        run: ["cargo", "test", "-p", "sn-miner", "--test", "real_process", "--", "--test-threads=1"]
