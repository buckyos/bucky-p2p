schema_version: 1
version: v0.1
module: p2p-frame
submodule: sn-distributed-directory
defaults:
  workdir: .
  timeout_sec: 1800
  env: {}
levels:
  unit:
    mode: enabled
    summary: Targeted SN distributed directory unit coverage for serving lease compatibility, owner control plane sessions, partitioned peer route, directory client/server boundary, OwnerMember heartbeat validity, HRW owner resolution, inter-SN validator side effects, registry fallback publish/query detail, owner peer command dispatch, and owner serving listener command dispatch.
    steps:
      - id: sn-distributed-directory-unit
        name: Run SN distributed directory targeted unit tests
        change_ids: ["sn_distributed_directory", "sn_distributed_query_merge", "sn_distributed_relay_call", "sn_inter_service_validation", "sn_owner_directory_peer_transport"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_distributed_directory", "--", "--nocapture"]
      - id: sn-directory-client-server-boundary-unit
        name: Run SN directory client/server boundary targeted unit tests
        change_ids: ["sn_owner_serving_role_boundary", "sn_directory_client_server_boundary"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_directory_client_server_boundary", "--", "--nocapture"]
      - id: sn-owner-member-heartbeat-validity-unit
        name: Run SN OwnerMember heartbeat validity targeted unit tests
        change_ids: ["sn_owner_member_heartbeat_validity"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_member_heartbeat_validity", "--", "--nocapture"]
      - id: sn-owner-control-plane-unit
        name: Run SN owner control plane targeted unit tests
        change_ids: ["sn_owner_control_plane_sessions"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_control_plane_sessions_require_leader_and_quorum", "--", "--nocapture"]
      - id: sn-owner-network-election-unit
        name: Run SN owner network election targeted unit tests
        change_ids: ["sn_owner_network_leader_election"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_network", "--", "--nocapture"]
      - id: sn-owner-leader-session-replication-unit
        name: Run SN owner leader session replication targeted unit tests
        change_ids: ["sn_owner_leader_session_replication"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_owner_leader_session_replication", "--", "--nocapture"]
      - id: sn-partitioned-peer-route-unit
        name: Run SN partitioned peer route targeted unit tests
        change_ids: ["sn_partitioned_peer_route"]
        run: ["cargo", "test", "-p", "p2p-frame", "sn_partitioned_peer_route_filters_revoked_serving_session", "--", "--nocapture"]
      - id: sn-owner-serving-listener-unit
        name: Run SN OwnerDirectoryServer serving-facing listener targeted unit tests
        change_ids: ["sn_owner_serving_listener_transport"]
        run: ["cargo", "test", "-p", "p2p-frame", "owner_serving_listener", "--", "--nocapture"]
  dv:
    mode: disabled
    summary: No automated multi-process SN DV harness exists for this first implementation.
    change_ids: ["sn_distributed_directory", "sn_owner_serving_role_boundary", "sn_directory_client_server_boundary", "sn_owner_member_heartbeat_validity", "sn_owner_control_plane_sessions", "sn_owner_network_leader_election", "sn_owner_leader_session_replication", "sn_partitioned_peer_route", "sn_distributed_query_merge", "sn_distributed_relay_call", "sn_inter_service_validation", "sn_owner_directory_peer_transport", "sn_owner_serving_listener_transport"]
    reason: "owner: testing; risk: distributed runtime, owner peer transport lifecycle, and serving listener lifecycle regression; acceptance impact: true multi-process report/query/call over TTP and Serving SN -> OwnerDirectoryServer listener lifecycle remain unevidenced."
  integration:
    mode: disabled
    summary: No automated workspace integration scenario exists for TTP-backed inter-SN transport or sn-miner owner-members startup.
    change_ids: ["sn_distributed_directory", "sn_owner_serving_role_boundary", "sn_directory_client_server_boundary", "sn_owner_member_heartbeat_validity", "sn_owner_control_plane_sessions", "sn_owner_network_leader_election", "sn_owner_leader_session_replication", "sn_partitioned_peer_route", "sn_distributed_query_merge", "sn_distributed_relay_call", "sn_inter_service_validation", "sn_owner_directory_peer_transport", "sn_owner_serving_listener_transport"]
    reason: "owner: testing; risk: deployment and network transport regression; acceptance impact: Serving SN -> OwnerDirectoryServer and owner peer integration remain recorded gaps."
