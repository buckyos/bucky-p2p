#       change_ids: ["CHG-example"]
#       run: ["cargo", "test", "-p", "<package>", "--doc"]
defaults:
  workdir: .
  timeout_sec: 600
  env: {}
# Level contracts per harness/rules/test-design-rules.md: unit = every changed-code branch,
# dv = module lifecycle + main + failure workflows, integration = per-interface success + failure semantics.
levels:
  unit:
    mode: enabled
    summary: core logic and submodule unit tests
    test_targets:
      - tests/unit/example-module
    preconditions:
      tools: []
      env: []
      services: []
      notes: []
    steps:
      - id: example-unit
        name: run unit tests
        change_ids: ["CHG-example"]
        run: ["<tool>", "<args>"]

  dv:
    mode: enabled
    summary: single-module runnable verification
    test_targets:
      - tests/dv/example-module
    preconditions:
      tools: []
      env: []
      services: []
      notes: []
    steps:
      - id: example-dv
        name: run dv tests
        change_ids: ["CHG-example"]
        run: ["<tool>", "<args>"]

  integration:
    mode: enabled
    summary: neighbor-module integration verification
    test_targets:
      - tests/integration/example-module
    preconditions:
      tools: []
      env: []
      services: []
      notes: []
    steps:
      - id: example-integration
        name: run integration tests
        change_ids: ["CHG-example"]
        run: ["<tool>", "<args>"]
