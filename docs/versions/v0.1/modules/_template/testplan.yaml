schema_version: 1
# Optional post-implementation test metadata. Generate after production code exists.
version: v0.1
module: example-module
task_name: 001-example-task
submodule:
api_impact:
  public_api: none
  crate_root_export_change: false
  build_surface_change: false
  documentation_examples_affected: false
# Exact files or directories whose current content binds the run artifact. Risk-triggered
# API/build-surface tasks must include production scope, repository consumers, fixtures,
# test code, and documentation examples. testplan.yaml itself is always included.
evidence_inputs: ["src"]
contract_checks:
  mode: disabled
  reason: no breaking API, crate-root export, build-surface, or documentation-example impact
  steps: []
