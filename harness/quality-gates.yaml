# Mechanical quality gates for this repository.
#
# harness/scripts/quality-check.py runs every gate below and fails when any
# gate fails. It is an explicit maintenance entrypoint: task execution,
# testing, acceptance, auto-pipeline completion, and check-all.py do not run it
# automatically. An explicitly requested run writes its artifact under the
# git-ignored test-results/quality-runs/ directory.
#
# Declare the repository's build/lint/typecheck commands here. Gates must be
# non-interactive, deterministic, and return a meaningful exit code.
#
# An explicitly empty list is a versioned, reviewable decision and requires a
# concrete non-placeholder empty_reason. A missing file or reason fails closed.
schema_version: 1
gates: []
empty_reason: Harness 刷新阶段只校验治理脚手架；Rust 构建与测试由统一测试入口按任务和模块范围执行。
# Example (Rust):
# gates:
#   - id: build
#     run: ["cargo", "build", "--workspace"]
#   - id: clippy
#     run: ["cargo", "clippy", "--workspace", "--", "-D", "warnings"]
# Example (Python):
